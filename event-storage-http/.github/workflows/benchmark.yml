name: event-storage-http benchmark

on:
  workflow_dispatch:

permissions: {}

jobs:
  benchmark:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: event-storage-http

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - run: npm ci --ignore-scripts

      - name: Run HTTP benchmark (write + read)
        run: |
          set -euo pipefail
          npm run bench:http | tee benchmark-output.txt

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: event-storage-http-benchmark-output
          path: event-storage-http/benchmark-output.txt

      - name: Add benchmark output to job summary
        run: |
          {
            echo '## event-storage-http benchmark output'
            echo
            echo '```text'
            cat benchmark-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

