<svg xmlns="http://www.w3.org/2000/svg" width="98" height="95" viewBox="0 0 98 98" role="img" aria-label="node-event-store icon - animated spinning logo">
  <defs>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .spinner {
        animation: spin 24s linear infinite;
        transform-origin: 49px 47.5px;
      }
      g.event-storage { fill: #029eb1; transform: rotate(45deg); transform-origin: 49px 49px; }
    </style>
  </defs>

  <g class="event-storage spinner">
    <!-- 4 circles (small, positioned at corners) -->
    <circle cx="25" cy="25" r="7.5"/>
    <circle cx="73" cy="25" r="7.5"/>
    <circle cx="25" cy="73" r="7.5"/>
    <circle cx="73" cy="73" r="7.5"/>

    <!-- 4 rectangles (axis-aligned, matching icon_rotated.png) -->
    <rect x="43.5" y="7.5" width="8" height="24"/>
    <rect x="43.5" y="62.5" width="8" height="24"/>
    <rect x="7.5" y="43.5" width="24" height="8"/>
    <rect x="62.5" y="43.5" width="24" height="8"/>
  </g>
</svg>
