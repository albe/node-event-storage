name: stress-test

on:
  workflow_dispatch:
    inputs:
      write_duration:
        description: 'Seconds the writer runs before being killed (default: 5)'
        required: false
        default: '5'

permissions: {}

jobs:
  stress-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install root dependencies
        run: npm ci

      - name: Run stress test
        env:
          WRITE_DURATION: ${{ github.event.inputs.write_duration }}
        run: cd stress-test && bash run.sh

      - name: Upload stress-test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results
          path: |
            stress-test/writer-stats.json
          if-no-files-found: ignore

  memory-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install root dependencies
        run: npm ci

      - name: Run memory consumption stress test
        run: node --expose-gc stress-test/memory.js
