<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 265" width="800" height="265" role="img" aria-labelledby="title1">
  <title id="title1">Traditional aggregate model — StudentSignedUpForCourse is ambiguous between the Student and Course aggregates</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="800" height="265" fill="#ffffff"/>

  <!-- ── Student Aggregate ── -->
  <rect x="20" y="25" width="235" height="215" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="137" y="47" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#1d4ed8">Student Aggregate</text>

  <ellipse cx="137" cy="97" rx="66" ry="23" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="137" y="102" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1e40af">Student</text>

  <rect x="47" y="138" width="180" height="28" rx="5" fill="white" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="137" y="157" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">StudentEnrolled</text>

  <rect x="47" y="184" width="180" height="28" rx="5" fill="white" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="137" y="203" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">StudentNameChanged</text>

  <!-- ── Course Aggregate ── -->
  <rect x="545" y="58" width="235" height="155" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="662" y="79" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#15803d">Course Aggregate</text>

  <ellipse cx="662" cy="120" rx="61" ry="23" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="662" y="125" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">Course</text>

  <rect x="572" y="161" width="180" height="28" rx="5" fill="white" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="662" y="180" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">CourseCreated</text>

  <!-- ── StudentSignedUpForCourse (ambiguous center) ── -->
  <rect x="280" y="111" width="240" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="400" y="133" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#78350f">StudentSignedUpForCourse</text>

  <!-- ── Arrow: SSFC → Student Aggregate (pointing left, with "?") ── -->
  <line x1="280" y1="128" x2="257" y2="128" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="269" y="121" text-anchor="middle" font-size="15" font-family="sans-serif" fill="#6b7280" font-style="italic">?</text>

  <!-- ── Arrow: SSFC → Course Aggregate (pointing right, with "?") ── -->
  <line x1="520" y1="128" x2="543" y2="128" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="531" y="121" text-anchor="middle" font-size="15" font-family="sans-serif" fill="#6b7280" font-style="italic">?</text>
</svg>
