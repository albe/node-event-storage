<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 170" width="880" height="170" role="img" aria-labelledby="dcb-title2">
  <title id="dcb-title2">Multiple overlapping Dynamic Consistency Boundaries per decision — "Rename Course" spans CourseCreated and CourseRenamed, "Change Course Capacity" spans CourseCreated and CourseCapacityChanged, and the cross-aggregate "Subscribe Student to Course" boundary spans all events including StudentCreated and StudentSubscribedToCourse</title>

  <rect width="880" height="170" fill="#ffffff"/>

  <!-- Boundary 1: Rename Course (amber) — spans CourseCreated + CourseRenamed -->
  <rect x="5" y="20" width="320" height="100" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" opacity="0.85"/>
  <text x="10" y="37" font-size="11" font-family="sans-serif" fill="#92400e" font-weight="bold">Rename Course</text>

  <!-- Boundary 2: Change Course Capacity (blue) — spans CourseCreated + CourseCapacityChanged -->
  <rect x="5" y="30" width="508" height="95" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" opacity="0.75"/>
  <text x="10" y="48" font-size="11" font-family="sans-serif" fill="#1e40af" font-weight="bold">Change Course Capacity</text>

  <!-- Boundary 3: Subscribe Student to Course (purple) — cross-aggregate, spans all -->
  <rect x="5" y="40" width="872" height="90" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5" opacity="0.65"/>
  <text x="10" y="59" font-size="11" font-family="sans-serif" fill="#6b21a8" font-weight="bold">Subscribe Student to Course</text>

  <!-- Events (drawn on top of boundary boxes) -->
  <rect x="10" y="73" width="150" height="36" rx="5" fill="white" stroke="#6b7280" stroke-width="1.2"/>
  <text x="85" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">CourseCreated</text>

  <rect x="166" y="73" width="150" height="36" rx="5" fill="white" stroke="#6b7280" stroke-width="1.2"/>
  <text x="241" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">CourseRenamed</text>

  <rect x="322" y="73" width="183" height="36" rx="5" fill="white" stroke="#6b7280" stroke-width="1.2"/>
  <text x="413" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">CourseCapacityChanged</text>

  <rect x="511" y="73" width="150" height="36" rx="5" fill="white" stroke="#6b7280" stroke-width="1.2"/>
  <text x="586" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">StudentCreated</text>

  <rect x="667" y="73" width="208" height="36" rx="5" fill="white" stroke="#6b7280" stroke-width="1.2"/>
  <text x="771" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">StudentSubscribedToCourse</text>

  <!-- Legend -->
  <rect x="8" y="125" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="25" y="136" font-size="10" font-family="sans-serif" fill="#374151">Rename Course</text>

  <rect x="145" y="125" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="162" y="136" font-size="10" font-family="sans-serif" fill="#374151">Change Course Capacity</text>

  <rect x="355" y="125" width="12" height="12" rx="2" fill="#a855f7"/>
  <text x="372" y="136" font-size="10" font-family="sans-serif" fill="#374151">Subscribe Student to Course (cross-aggregate)</text>
</svg>
