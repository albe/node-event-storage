<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" width="900" height="310" role="img" aria-labelledby="title2">
  <title id="title2">Dynamic Consistency Boundary for course enrolment — the boundary spans StudentEnrolled, StudentSignedUpForCourse, and CourseCreated across the dotted Student and Course aggregate boundaries. StudentNameChanged sits outside the DCB boundary.</title>

  <rect width="900" height="310" fill="#ffffff"/>

  <!-- ── StudentNameChanged (outside DCB) ── -->
  <rect x="10" y="124" width="148" height="28" rx="5" fill="white" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="84" y="143" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151">StudentNameChanged</text>

  <!-- ── Dynamic Consistency Boundary ── -->
  <rect x="168" y="20" width="722" height="263" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="529" y="42" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#92400e">Dynamic Consistency Boundary — Course Enrolment</text>

  <!-- ── Student Aggregate (dotted, inside DCB) ── -->
  <rect x="188" y="55" width="195" height="175" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="285" y="74" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#1d4ed8">Student Aggregate</text>

  <ellipse cx="285" cy="117" rx="63" ry="22" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="285" y="122" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1e40af">Student</text>

  <rect x="198" y="154" width="175" height="28" rx="5" fill="white" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="285" y="173" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">StudentEnrolled</text>

  <!-- ── StudentSignedUpForCourse (center, inside DCB) ── -->
  <rect x="400" y="111" width="225" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="512" y="133" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#78350f">StudentSignedUpForCourse</text>

  <!-- ── Course Aggregate (dotted, inside DCB) ── -->
  <rect x="637" y="55" width="233" height="175" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="753" y="74" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#15803d">Course Aggregate</text>

  <ellipse cx="753" cy="117" rx="63" ry="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="753" y="122" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534">Course</text>

  <rect x="654" y="154" width="185" height="28" rx="5" fill="white" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="746" y="173" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">CourseCreated</text>

  <!-- ── Edge: StudentNameChanged ─── Student ── -->
  <line x1="158" y1="138" x2="222" y2="117" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4,3"/>
</svg>
